function CastPage({ members, setMembers }) {
  const [filter, setFilter] = useState("all");
  const [editMode, setEditMode] = useState(false);
  const [editing, setEditing] = useState(null);
  const filters = ["all", "singer", "dancer", "actor", "model"];
  const filtered = members.filter(c => filter === "all" || c.genre === filter);

  const handlePhoto = (id, e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      setMembers(prev => prev.map(m => m.id === id ? {...m, photo: ev.target.result} : m));
    };
    reader.readAsDataURL(file);
  };

  const handleEdit = (id, field, val) => {
    setMembers(prev => prev.map(m => m.id === id ? {...m, [field]: val} : m));
  };

  return (
    <div>
      <div className="ph">
        <div className="ph-big">CAST</div>
        <div style={{ maxWidth: 960, margin: "0 auto", position: "relative" }}>
          <p className="ph-label">CAST</p>
          <h1 className="ph-title">所属キャスト</h1>
          <p className="ph-sub">ダンサー・シンガー・俳優・モデルが所属しています。<br />出演依頼はInstagram DMにて受付中。</p>
          <button
            onClick={() => setEditMode(!editMode)}
            style={{marginTop:16,padding:"8px 20px",background:editMode?"#e53":"#0099bb",color:"white",border:"none",cursor:"pointer",fontFamily:"Space Grotesk,sans-serif",fontSize:11,letterSpacing:"0.15em",fontWeight:600}}
          >
            {editMode ? "✓ 編集完了" : "✏️ 編集モード"}
          </button>
        </div>
      </div>

      <div className="filter-bar">
        {filters.map(f => (
          <button key={f} className={`fb${filter === f ? " active" : ""}`} onClick={() => setFilter(f)}>
            {f.toUpperCase()}
          </button>
        ))}
      </div>

      <section className="cast-sec">
        <div className="cast-inner">
          <div className="cast-grid">
            {filtered.map(c => (
              <div key={c.id} className="cast-card" style={{outline: editMode ? "2px dashed #0099bb" : "none"}}>
                <div className="cast-img" style={{position:"relative",cursor: editMode ? "pointer" : "default"}}
                  onClick={() => editMode && document.getElementById("photo-input-"+c.id)?.click()}>
                  {c.photo
                    ? <img src={c.photo} alt={c.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"top"}} />
                    : <span style={{fontSize:48}}>{c.icon}</span>}
                  {editMode && (
                    <div style={{position:"absolute",inset:0,background:"rgba(0,153,187,0.5)",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,flexDirection:"column",gap:4}}>
                      <span style={{fontSize:24}}>📷</span>
                      <span style={{color:"white",fontSize:11,fontFamily:"Space Grotesk",fontWeight:600}}>写真を変更</span>
                    </div>
                  )}
                  <input id={"photo-input-"+c.id} type="file" accept="image/*" style={{display:"none"}} onChange={e => handlePhoto(c.id, e)} />
                </div>

                {editMode ? (
                  <>
                    <input value={c.role} onChange={e => handleEdit(c.id,"role",e.target.value)}
                      style={{width:"100%",marginBottom:6,padding:"4px 8px",fontSize:10,letterSpacing:"0.28em",color:"#0099bb",fontFamily:"Space Grotesk",fontWeight:600,border:"1px solid #ccc",background:"#f9f9f9"}} />
                    <input value={c.name} onChange={e => handleEdit(c.id,"name",e.target.value)}
                      style={{width:"100%",marginBottom:12,padding:"4px 8px",fontSize:18,fontFamily:"Space Grotesk",fontWeight:700,border:"1px solid #ccc",background:"#f9f9f9"}} />
                    <textarea value={c.bio} onChange={e => handleEdit(c.id,"bio",e.target.value)}
                      style={{width:"100%",marginBottom:16,padding:"4px 8px",fontSize:13,fontFamily:"Noto Sans JP",border:"1px solid #ccc",background:"#f9f9f9",resize:"vertical",minHeight:80}} />
                  </>
                ) : (
                  <>
                    <p className="cast-role">{c.role}</p>
                    <h3 className="cast-name">{c.name}</h3>
                    <p className="cast-bio">{c.bio}</p>
                  </>
                )}
                <div className="cast-tags">{c.tags.map(t => <span key={t} className="ctag">{t}</span>)}</div>
              </div>
            ))}
          </div>

          <div className="join-banner">
            <div>
              <p className="jb-title">キャスト募集中</p>
              <p className="jb-desc">ダンサー・シンガー・俳優・モデルとして映像活動したい方、随時募集しています。<br />経験・年齢不問。まずはDMで自己紹介を。</p>
            </div>
            <button className="btn btn-primary" onClick={() => window.open(IG_URL, "_blank")}>📩 所属希望はこちら</button>
          </div>
        </div>
      </section>
    </div>
  );
}

          <h1 className="ph-title">トピックス</h1>
          <p className="ph-sub">キャストの活動情報・新着ニュースをお届けします。</p>
        </div>
      </div>

      <section className="cast-sec">
        <div className="cast-inner">
          <div style={{ display: "flex", flexDirection: "column", gap: 2, background: "var(--border)" }}>
            {topics.map(t => (
              <div key={t.id} style={{ background: "rgba(255,255,255,0.9)", padding: "36px 40px", display: "flex", gap: 32, alignItems: "flex-start" }}>
                <div style={{ minWidth: 90, textAlign: "center" }}>
                  <p style={{ fontFamily: "Space Grotesk", fontSize: 11, color: "var(--dim)", letterSpacing: "0.1em", marginBottom: 8 }}>{t.date}</p>
                  <span style={{ display: "inline-block", background: tagColor(t.tag), color: "white", fontFamily: "Space Grotesk", fontSize: 9, fontWeight: 700, letterSpacing: "0.15em", padding: "3px 10px" }}>{t.tag}</span>

}

function App() {
  const [page, setPage] = useState("home");
  const [members, setMembers] = useState(castMembers);

  const handleSetPage = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  return (
    <>
      <style>{styles}</style>
      <Nav page={page} setPage={handleSetPage} />
      {page === "home" ? <HomePage setPage={handleSetPage} /> : page === "cast" ? <CastPage members={members} setMembers={setMembers} /> : <TopicsPage />}
      <Footer setPage={handleSetPage} />
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
